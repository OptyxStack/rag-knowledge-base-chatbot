services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_KEY: ${API_KEY:-}
        VITE_ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    ports:
      - "5174:80"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    profiles:
      - full

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: support-ai-assistant:local
    ipc: host  # Recommended for Chromium in Docker (avoids memory crashes)
    ports:
      - "8000:8000"
    volumes:
      - ./source:/app/source
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - PLAYWRIGHT_INSTALL_ON_STARTUP=false
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/support_ai
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@postgres:5432/support_ai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - OPENSEARCH_HOST=http://opensearch:9200
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-5.2}
      - RERANKER_PROVIDER=${RERANKER_PROVIDER:-custom}
      - LLM_MAX_TOKENS=2048
      - API_KEY=${API_KEY:-}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - OBJECT_STORAGE_URL=http://minio:9000
      - OBJECT_STORAGE_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - OBJECT_STORAGE_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - OBJECT_STORAGE_BUCKET=support-ai-docs
      - MAX_REQUEST_BODY_BYTES=1048576
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    image: support-ai-assistant:local
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - PLAYWRIGHT_INSTALL_ON_STARTUP=false
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/support_ai
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@postgres:5432/support_ai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - OPENSEARCH_HOST=http://opensearch:9200
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - RERANKER_PROVIDER=${RERANKER_PROVIDER:-custom}
      - API_KEY=${API_KEY:-}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - OBJECT_STORAGE_URL=http://minio:9000
      - OBJECT_STORAGE_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - OBJECT_STORAGE_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - OBJECT_STORAGE_BUCKET=support-ai-docs
    depends_on:
      - api
    command: celery -A worker.celery_app worker --loglevel=info

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_ai
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"  # Use 6380 on host to avoid Windows port 6379 exclusion
    volumes:
      - redis_data:/data

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - plugins.security.disabled=true
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  qdrant:
    image: qdrant/qdrant:v1.12.0  # v1.10+ required for query_points API (Python client)
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb myminio/support-ai-docs --ignore-existing;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  qdrant_data:
  minio_data:
