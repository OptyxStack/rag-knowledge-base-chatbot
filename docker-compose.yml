services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - api
    environment:
      - VITE_API_KEY=${API_KEY:-dev-key}

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    profiles:
      - full

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: support-ai-assistant:local
    ipc: host  # Recommended for Chromium in Docker (avoids memory crashes)
    ports:
      - "8000:8000"
    volumes:
      - ./source:/app/source
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/support_ai
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@postgres:5432/support_ai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - OPENSEARCH_HOST=http://opensearch:9200
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-5.2}
      - LLM_MAX_TOKENS=2048
      - API_KEY=${API_KEY:-dev-key}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-admin-key}
      - OBJECT_STORAGE_URL=http://minio:9000
      - OBJECT_STORAGE_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - OBJECT_STORAGE_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - OBJECT_STORAGE_BUCKET=support-ai-docs
      - MAX_REQUEST_BODY_BYTES=1048576
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      opensearch:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    image: support-ai-assistant:local
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/support_ai
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@postgres:5432/support_ai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - OPENSEARCH_HOST=http://opensearch:9200
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OBJECT_STORAGE_URL=http://minio:9000
      - OBJECT_STORAGE_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - OBJECT_STORAGE_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - OBJECT_STORAGE_BUCKET=support-ai-docs
    depends_on:
      - api
    command: celery -A worker.celery_app worker --loglevel=info

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_ai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - plugins.security.disabled=true
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  qdrant:
    image: qdrant/qdrant:v1.7.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/support-ai-docs --ignore-existing;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  qdrant_data:
  minio_data:
