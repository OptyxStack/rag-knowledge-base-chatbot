services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - api
    command: ["sh", "-c", "/usr/local/bin/npm install && /usr/local/bin/npm run dev -- --host 0.0.0.0"]
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_KEY=${API_KEY:-dev-key}
      - VITE_API_BASE=/v1
      - VITE_API_TARGET=http://api:8000

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: support-ai-assistant:dev
    ipc: host
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    environment:
      - WATCHFILES_FORCE_POLLING=true
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - PLAYWRIGHT_INSTALL_ON_STARTUP=false
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/support_ai
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@postgres:5432/support_ai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - OPENSEARCH_HOST=http://opensearch:9200
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - API_KEY=${API_KEY:-dev-key}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-admin-key}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-me}
      # Hybrid normalizer profile: generic default.
      # For legacy compatibility, override these in `.env` with:
      # NORMALIZER_DOMAIN_TERMS=vps,dedicated,server,windows,linux,kvm,macos,pricing,plan,plans,nvme,bandwidth,ram,cpu,vds,epyc,xeon,product,order,account,refund
      # NORMALIZER_QUERY_EXPANSION=true
      # NORMALIZER_SLOTS_ENABLED=true
      # NORMALIZER_SLOT_PRODUCT_TYPES=vps,dedicated,vds  (empty = disabled)
      # NORMALIZER_SLOT_OS_TYPES=windows,linux,macos  (empty = disabled)
      - NORMALIZER_DOMAIN_TERMS=${NORMALIZER_DOMAIN_TERMS:-}
      - NORMALIZER_QUERY_EXPANSION=${NORMALIZER_QUERY_EXPANSION:-false}
      - NORMALIZER_SLOTS_ENABLED=${NORMALIZER_SLOTS_ENABLED:-false}
      - NORMALIZER_SLOT_PRODUCT_TYPES=${NORMALIZER_SLOT_PRODUCT_TYPES:-}
      - NORMALIZER_SLOT_OS_TYPES=${NORMALIZER_SLOT_OS_TYPES:-}
      - OBJECT_STORAGE_URL=http://minio:9000
      - OBJECT_STORAGE_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - OBJECT_STORAGE_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - OBJECT_STORAGE_BUCKET=support-ai-docs

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: support-ai-assistant:dev
    volumes:
      - ./:/app
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - PLAYWRIGHT_INSTALL_ON_STARTUP=false
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/support_ai
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@postgres:5432/support_ai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - OPENSEARCH_HOST=http://opensearch:9200
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - API_KEY=${API_KEY:-dev-key}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-admin-key}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-me}
      - NORMALIZER_DOMAIN_TERMS=${NORMALIZER_DOMAIN_TERMS:-}
      - NORMALIZER_QUERY_EXPANSION=${NORMALIZER_QUERY_EXPANSION:-false}
      - NORMALIZER_SLOTS_ENABLED=${NORMALIZER_SLOTS_ENABLED:-false}
      - NORMALIZER_SLOT_PRODUCT_TYPES=${NORMALIZER_SLOT_PRODUCT_TYPES:-}
      - NORMALIZER_SLOT_OS_TYPES=${NORMALIZER_SLOT_OS_TYPES:-}
      - OBJECT_STORAGE_URL=http://minio:9000
      - OBJECT_STORAGE_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - OBJECT_STORAGE_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - OBJECT_STORAGE_BUCKET=support-ai-docs
